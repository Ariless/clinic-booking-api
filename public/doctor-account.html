<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doctor — Account</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-qa="page-doctor-account">
    <header class="site-header" data-qa="site-header">
      <div class="header-left">
        <a class="brand" href="/" data-qa="site-brand">Clinic booking</a>
      </div>
      <nav class="user-nav" aria-label="Account" data-qa="site-user-nav">
        <span id="navAuth" class="muted" style="margin: 0" data-qa="site-auth-label"></span>
        <a href="/login" id="loginNav" data-qa="site-login">Sign in</a>
        <button type="button" id="logoutBtn" class="secondary" style="display: none; margin-top: 0" data-qa="site-logout">
          Sign out
        </button>
      </nav>
    </header>

    <nav class="doctor-subnav" aria-label="Doctor workspace" data-qa="doctor-nav">
      <a href="/doctor" data-doctor-nav="dashboard" data-qa="doctor-nav-dashboard">Dashboard</a>
      <a href="/doctor/appointments" data-doctor-nav="appointments" data-qa="doctor-nav-appointments">Appointments</a>
      <a href="/doctor/schedule" data-doctor-nav="schedule" data-qa="doctor-nav-schedule">Schedule</a>
      <a href="/doctor/account" data-doctor-nav="account" data-qa="doctor-nav-account">Account</a>
    </nav>

    <section data-qa="doctor-account-section">
      <h1 style="margin: 0 0 0.5rem; font-size: 1.05rem; font-weight: 600" data-qa="doctor-account-title">Your profile</h1>
      <p class="muted" style="margin-top: 0">
        What we show here is tied to the clinic directory and your sign-in. Use <strong>Sign out</strong> on shared
        devices.
      </p>
      <div id="accountBanner" class="banner-error" style="display: none; margin-bottom: 0.75rem" role="alert" data-qa="doctor-account-banner"></div>
      <div id="accountBody" data-qa="doctor-account-body"></div>
    </section>

    <details class="technical" data-qa="doctor-account-tech-details">
      <summary>Technical details (optional)</summary>
      <pre id="accountRaw" style="margin-top: 0.5rem" data-qa="doctor-account-tech-log">—</pre>
    </details>

    <script src="/js/app-core.js"></script>
    <script src="/js/app-nav.js"></script>
    <script src="/js/doctor-shell.js"></script>
    <script>
      (function () {
        if (!window.ClinicDoctorShell.guardDoctorWorkspace()) {
          return;
        }
        window.ClinicDoctorShell.setActiveNav("account");

        const accountBody = document.getElementById("accountBody");
        const accountRaw = document.getElementById("accountRaw");
        const accountBanner = document.getElementById("accountBanner");

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        async function renderAccount() {
          const prevScrollY = window.scrollY;
          window.ClinicApp.blurActiveWithin(accountBody);
          try {
            accountBanner.style.display = "none";
            accountBanner.textContent = "";
            window.ClinicNav.refresh();
            const u = window.ClinicApp.getUser();
            if (!u) {
              accountBody.innerHTML = `
              <p class="muted" style="margin:0 0 0.75rem">You’re not signed in.</p>
              <p style="margin:0 0 0.5rem"><a href="/login">Sign in</a> as a clinician.</p>
              <p style="margin:0 0 0.5rem"><a href="/register/doctor">Create a doctor account</a> and link it to your row in the directory.</p>
              <p style="margin:0"><a href="/register">All registration options</a></p>
            `;
              accountRaw.textContent = "null";
              return;
            }
            if (u.role !== "doctor") {
              accountBody.innerHTML =
                '<p class="muted">This page is for clinician accounts. Your current role is <strong>' +
                escapeHtml(u.role) +
                "</strong>.</p>";
              accountRaw.textContent = JSON.stringify(u, null, 2);
              return;
            }
            try {
              const data = await window.ClinicApp.api("/api/v1/auth/me");
              const user = data.user;
              const doc = data.doctorProfile;
              const dirName = doc && doc.name ? escapeHtml(doc.name) : "—";
              const dirSpec = doc && doc.specialty ? escapeHtml(doc.specialty) : "—";
              accountBody.innerHTML = `
              <dl class="dl-account">
                <dt>Name</dt><dd>${escapeHtml(user.name || "—")}</dd>
                <dt>Email</dt><dd>${escapeHtml(user.email)}</dd>
                <dt>Directory name</dt><dd>${dirName}</dd>
                <dt>Specialty on file</dt><dd>${dirSpec}</dd>
              </dl>
              <p style="margin:0.85rem 0 0">
                <a href="/doctor/schedule">Your diary</a> · <a href="/doctor/appointments">Visit requests</a>
              </p>
              <div class="danger-zone" id="deleteZone" data-qa="doctor-account-danger-zone">
                <h2>Close this demo account</h2>
                <p>You won’t be able to sign in again with this email in this environment. Your past visits stay in the database for the demo.</p>
                <button type="button" class="secondary" id="deleteAccountBtn" data-qa="doctor-account-delete">Close my account</button>
              </div>
            `;
              accountRaw.textContent = JSON.stringify(data, null, 2);
              document.getElementById("deleteAccountBtn").addEventListener("click", async () => {
                const ok = window.confirm(
                  "Close this clinician account for good? You will be signed out and will need a new registration to use this email again."
                );
                if (!ok) {
                  return;
                }
                try {
                  await window.ClinicApp.api("/api/v1/auth/me", { method: "DELETE" });
                  window.ClinicApp.clearSession();
                  window.location.assign("/");
                } catch (err) {
                  const msg =
                    err.body && typeof err.body === "object" && err.body.message
                      ? String(err.body.message)
                      : "Could not close the account.";
                  accountBanner.textContent = msg;
                  accountBanner.style.display = "block";
                }
              });
            } catch (e) {
              accountBody.innerHTML =
                '<p class="muted">We couldn’t load your directory link. You can still use other pages from the menu.</p>';
              accountRaw.textContent = JSON.stringify({ error: String(e.message) }, null, 2);
            }
          } finally {
            window.ClinicApp.restoreScrollY(prevScrollY);
          }
        }

        window.ClinicNav.bindLogout(() => {
          renderAccount();
        });

        renderAccount();
      })();
    </script>
  </body>
</html>
