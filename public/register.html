<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create an account</title>
    <link rel="stylesheet" href="/css/app.css" />
    <style>
      body {
        max-width: 28rem;
        margin: 0 auto;
        padding: 1.5rem 1.25rem;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 1.25rem 1.15rem;
      }
      .card h1 {
        margin: 0 0 0.35rem;
        font-size: 1.15rem;
      }
      .card p {
        margin: 0 0 1rem;
        color: #64748b;
        font-size: 0.9rem;
      }
      .card a.action {
        display: block;
        margin-top: 0.65rem;
        padding: 0.55rem 0.75rem;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        text-align: center;
        font-weight: 600;
        text-decoration: none;
      }
      .card a.action.secondary {
        background: #f1f5f9;
        color: #334155;
        border: 1px solid #e2e8f0;
      }
      .footer {
        margin-top: 1.25rem;
        text-align: center;
        font-size: 0.88rem;
      }
      .footer a {
        color: #2563eb;
      }
    </style>
  </head>
  <body data-qa="page-register-hub">
    <div class="card" data-qa="register-hub-card">
      <h1 data-qa="register-hub-title">Create an account</h1>
      <p>Choose how you’ll use the clinic demo.</p>
      <a class="action" href="/register/patient" data-qa="register-hub-patient">I’m a patient</a>
      <a class="action secondary" href="/register/doctor" data-qa="register-hub-doctor">I’m a doctor (staff)</a>
      <div class="footer" data-qa="register-hub-footer">
        <a href="/login" data-qa="register-hub-link-login">Already have an account? Sign in</a> ·
        <a href="/" data-qa="register-hub-link-home">Home</a>
      </div>
    </div>
  </body>
</html>
