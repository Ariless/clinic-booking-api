openapi: 3.0.3
info:
  title: Clinic booking API (learning)
  description: |
    Hand-maintained OpenAPI spec. Update this file when routes change; UI at `/api/docs`.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local (default PORT from `.env`)

tags:
  - name: Meta
    description: Service metadata and pipeline checks
  - name: Health
    description: Liveness and readiness-style checks
  - name: Metrics
    description: In-process counters (demo)
  - name: Waitlist
    description: Waitlist for unavailable slots
  - name: Auth
    description: Register and login (JWT)
  - name: AI
    description: Symptom → specialty recommendation (rule-based demo)
  - name: Doctors
    description: Read doctors and available slots
  - name: Appointments
    description: Book and read appointments

paths:
  /health:
    get:
      tags: [Health]
      summary: Readiness-style probe (database + AI availability flags)
      operationId: getHealth
      responses:
        "200":
          description: Database reachable; `status` is `ok` or `degraded` if optional checks fail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Database down (`status` is `degraded`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      tags: [Metrics]
      summary: In-process counters and simple ratios (resets on process restart)
      operationId: getMetrics
      responses:
        "200":
          description: JSON snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsSnapshot"

  /api/v1:
    get:
      tags: [Meta]
      summary: API metadata
      operationId: getApiRoot
      responses:
        "200":
          description: Service name, version, environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMetadata"

  /api/v1/error-test:
    get:
      tags: [Meta]
      summary: Throws a controlled error (error pipeline check)
      operationId: getErrorTest
      responses:
        "418":
          description: Example error (shape matches global error handler)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register patient or doctor
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: JWT and public user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Doctor record not found (doctor registration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: |
            `EMAIL_TAKEN` — an **active** account already uses this email.
            `EMAIL_RETIRED` — this email belongs to a **soft-deleted** account (unique email prevents reuse in the demo DB).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT and public user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new access + refresh pair
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New JWTs and public user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current session profile
      description: Returns the signed-in user and, for doctors, the linked directory row (name, specialty).
      operationId: getAuthMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User plus optional doctor directory profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    delete:
      tags: [Auth]
      summary: Soft-delete current patient or doctor account (demo)
      operationId: deleteAuthMe
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Account closed; session should be cleared on the client
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Role not allowed to close via this endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/ai/recommend-doctor:
    post:
      tags: [AI]
      summary: Recommend specialty and doctors from symptoms (rule-based)
      operationId: recommendDoctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendDoctorRequest"
      responses:
        "200":
          description: Specialty + matching doctors from DB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendDoctorResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "422":
          description: Could not map to allowed specialty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests (`RATE_LIMITED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "503":
          description: AI path disabled (`FEATURE_DISABLED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/doctors:
    get:
      tags: [Doctors]
      summary: List all doctors
      operationId: listDoctors
      responses:
        "200":
          description: Array of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"

  /api/v1/doctors/me/slots:
    get:
      tags: [Doctors]
      summary: List all slots for the authenticated doctor’s linked record
      operationId: listMyDoctorSlots
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All slots for `doctorRecordId` (available and booked)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not a doctor or profile not linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    post:
      tags: [Doctors]
      summary: Create a slot for the authenticated doctor’s linked directory record
      operationId: createMyDoctorSlot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSlotRequest"
      responses:
        "201":
          description: Slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"
        "400":
          description: Validation error (missing times, invalid datetimes, or end not after start)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not a doctor or profile not linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Doctor record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: New slot overlaps another opening for the same doctor (`SLOT_OVERLAP`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/doctors/me/slots/{slotId}:
    delete:
      tags: [Doctors]
      summary: Delete a diary opening when it has no active visits (authenticated doctor)
      operationId: deleteMyDoctorSlot
      security:
        - bearerAuth: []
      parameters:
        - name: slotId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: Slot removed
        "400":
          description: Invalid slot id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not owner doctor or profile not linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Slot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: Slot still has a pending or confirmed appointment (`SLOT_IN_USE`); only cancelled/rejected history is removed with the slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/doctors/{id}:
    get:
      tags: [Doctors]
      summary: Get doctor by id
      operationId: getDoctorById
      parameters:
        - $ref: "#/components/parameters/DoctorId"
      responses:
        "200":
          description: Doctor row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "404":
          description: Doctor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/doctors/{id}/slots:
    get:
      tags: [Doctors]
      summary: List available slots for a doctor
      operationId: listDoctorSlots
      parameters:
        - $ref: "#/components/parameters/DoctorId"
      responses:
        "200":
          description: Available slots only
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"
        "400":
          description: Invalid doctor id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Doctor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    post:
      tags: [Doctors]
      summary: Create a slot (authenticated doctor for own doctor id)
      operationId: createDoctorSlot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DoctorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSlotRequest"
      responses:
        "201":
          description: Slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not owner doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Doctor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: New slot overlaps another opening for the same doctor (`SLOT_OVERLAP`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments:
    get:
      tags: [Appointments]
      summary: List appointments for the authenticated patient (same data as `/my`)
      operationId: listAppointmentsByPatient
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not a patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    post:
      tags: [Appointments]
      summary: Book a slot for the authenticated patient (transactional)
      operationId: bookAppointment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookAppointmentRequest"
      responses:
        "201":
          description: Created appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not a patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Slot or patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: Slot already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/waitlist:
    post:
      tags: [Waitlist]
      summary: Join waitlist for a booked (unavailable) slot
      operationId: joinSlotWaitlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slotId]
              properties:
                slotId:
                  type: integer
                  minimum: 1
      responses:
        "201":
          description: Waitlist row created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistEntry"
        "400":
          description: Slot still available (`SLOT_STILL_AVAILABLE`) or validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not a patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Slot or patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: Already on waitlist (`WAITLIST_DUPLICATE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/waitlist/me:
    get:
      tags: [Waitlist]
      summary: List caller waitlist rows with slot times
      operationId: listMyWaitlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaitlistEntryWithSlot"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not a patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/waitlist/{waitlistId}:
    delete:
      tags: [Waitlist]
      summary: Remove own waitlist entry
      operationId: deleteWaitlistEntry
      security:
        - bearerAuth: []
      parameters:
        - name: waitlistId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  removed:
                    type: boolean
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/my:
    get:
      tags: [Appointments]
      summary: List appointments for the authenticated patient
      operationId: listMyAppointments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Caller appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not a patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/doctor:
    get:
      tags: [Appointments]
      summary: List appointments on slots owned by the authenticated doctor
      operationId: listDoctorAppointments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Appointments for doctor slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not a doctor or doctor not linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/{id}/cancel:
    patch:
      tags: [Appointments]
      summary: Cancel appointment (authenticated patient); frees the slot
      description: Caller must be the patient who owns the appointment. Allowed source statuses — `pending`, `confirmed`.
      operationId: cancelAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Appointment updated to cancelled; slot available again
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not the owning patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "422":
          description: Invalid status transition (e.g. already cancelled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/{id}/confirm:
    patch:
      tags: [Appointments]
      summary: Doctor confirms a pending appointment
      operationId: confirmAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Appointment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not slot owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "422":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/{id}/reject:
    patch:
      tags: [Appointments]
      summary: Doctor rejects a pending appointment (frees slot)
      operationId: rejectAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Appointment rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not slot owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "422":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/{id}/cancel-as-doctor:
    patch:
      tags: [Appointments]
      summary: Doctor cancels a pending or confirmed visit (frees the slot)
      description: Caller must own the slot. Allowed source statuses — `pending`, `confirmed`; result status `cancelled`.
      operationId: cancelAppointmentAsDoctor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Appointment cancelled; slot available again
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Not slot owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "422":
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/appointments/{id}:
    get:
      tags: [Appointments]
      summary: Get appointment by id
      operationId: getAppointmentById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Appointment row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Use Authorization header — `Bearer <token>` from `/api/v1/auth/login`

  parameters:
    DoctorId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Doctor primary key (numeric string in path)

  schemas:
    ApiMetadata:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        environment:
          type: string
          enum: [development, test, production]

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        checks:
          type: object
          additionalProperties: true

    MetricsSnapshot:
      type: object
      properties:
        counters:
          type: object
          additionalProperties:
            type: number
        ratios:
          type: object
          additionalProperties:
            type: number
            nullable: true

    WaitlistEntry:
      type: object
      properties:
        id:
          type: integer
        slotId:
          type: integer
        patientId:
          type: integer
        createdAt:
          type: string
          format: date-time

    WaitlistEntryWithSlot:
      allOf:
        - $ref: "#/components/schemas/WaitlistEntry"
        - type: object
          properties:
            slotStartTime:
              type: string
              format: date-time
            slotEndTime:
              type: string
              format: date-time
            doctorId:
              type: integer

    Doctor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        specialty:
          type: string

    Slot:
      type: object
      properties:
        id:
          type: integer
        doctorId:
          type: integer
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        isAvailable:
          type: integer
          description: SQLite stores 0/1

    Appointment:
      type: object
      properties:
        id:
          type: integer
        slotId:
          type: integer
        patientId:
          type: integer
        status:
          type: string
          example: pending
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          nullable: true

    BookAppointmentRequest:
      type: object
      required: [slotId]
      properties:
        slotId:
          type: integer
          minimum: 1
          description: Visit is booked for the authenticated patient (`req.user.id`).

    CancelAppointmentRequest:
      type: object
      description: Deprecated — cancel uses the JWT patient; body is ignored.
      properties: {}

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
        role:
          type: string
          enum: [patient, doctor]
          default: patient
        doctorRecordId:
          type: integer
          minimum: 1
          description: Required when role is doctor — must match `doctors.id`

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    TokenResponse:
      type: object
      properties:
        token:
          type: string
          description: Short-lived access JWT (`Authorization` header)
        refreshToken:
          type: string
          description: Long-lived refresh JWT for `POST /api/v1/auth/refresh`
        user:
          $ref: "#/components/schemas/PublicUser"

    AuthMeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
        doctorProfile:
          description: Linked clinic directory row when the user is a doctor; omitted or null for patients
          nullable: true
          $ref: "#/components/schemas/Doctor"

    PublicUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        name:
          type: string
        doctorRecordId:
          type: integer
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        deletedAt:
          type: string
          nullable: true

    RecommendDoctorRequest:
      type: object
      required: [symptoms]
      properties:
        symptoms:
          type: string

    RecommendDoctorResponse:
      type: object
      properties:
        recommendedSpecialty:
          type: string
        doctors:
          type: array
          items:
            $ref: "#/components/schemas/Doctor"

    CreateSlotRequest:
      type: object
      required: [startTime, endTime]
      properties:
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        isAvailable:
          type: boolean
          default: true

    ErrorBody:
      type: object
      properties:
        errorCode:
          type: string
        message:
          type: string
        requestId:
          type: string
          format: uuid
